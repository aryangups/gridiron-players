name: Run scraper

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

permissions:
  contents: write

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    env:
      SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_PORT: ${{ secrets.SMTP_PORT || 587 }}
      SMTP_FROM: ${{ secrets.SMTP_FROM || secrets.SMTP_USERNAME }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run scraper
        run: python scripts/run_update.py --all

      - name: Validate scraper results
        run: python scripts/validate_data.py

      - name: Commit scraper results
        id: commit
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/exports data/processed logs
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No scraper result changes to commit"
          else
            git commit -m "Update scraper results"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Send success email
        if: success() && env.SMTP_SERVER != '' && env.SMTP_USERNAME != '' && env.SMTP_PASSWORD != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ env.SMTP_SERVER }}
          server_port: ${{ env.SMTP_PORT }}
          username: ${{ env.SMTP_USERNAME }}
          password: ${{ env.SMTP_PASSWORD }}
          subject: "College football scraper succeeded"
          to: aryancurry1212@gmail.com
          from: ${{ env.SMTP_FROM }}
          body: |
            The college football scraper completed successfully.

            Repository: ${{ github.repository }}
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Results changed: ${{ steps.commit.outputs.changed }}
