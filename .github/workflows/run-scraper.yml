name: Run scraper

on:
  workflow_dispatch:
    inputs:
      run_type:
        description: "Scraper run type"
        required: true
        default: "full"
        type: choice
        options:
          - full
          - quick
  schedule:
    # Full run candidates. The workflow checks America/New_York time so this stays 5 PM across DST changes.
    - cron: "0 21 * * *"
    - cron: "0 22 * * *"
    # Quick run without player stats: roster/news/injury refresh every 5 hours.
    - cron: "0 */5 * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    env:
      SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_PORT: ${{ secrets.SMTP_PORT || 587 }}
      SMTP_FROM: ${{ secrets.SMTP_FROM || secrets.SMTP_USERNAME }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Determine run type
        id: run-type
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "type=${{ inputs.run_type }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.schedule }}" == "0 */5 * * *" ]]; then
            echo "type=quick" >> "$GITHUB_OUTPUT"
          elif [[ "$(TZ=America/New_York date +%H)" == "17" ]]; then
            echo "type=full" >> "$GITHUB_OUTPUT"
          else
            echo "type=skip" >> "$GITHUB_OUTPUT"
          fi

      - name: Run full scraper
        if: steps.run-type.outputs.type == 'full'
        run: python scripts/run_update.py --all

      - name: Run quick scraper
        if: steps.run-type.outputs.type == 'quick'
        run: python scripts/run_update.py --rosters --news --injuries

      - name: Validate scraper results
        if: steps.run-type.outputs.type != 'skip'
        run: python scripts/validate_data.py

      - name: Commit scraper results
        if: steps.run-type.outputs.type != 'skip'
        id: commit
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/exports data/processed logs
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No scraper result changes to commit"
          else
            git commit -m "Update scraper results"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Send success email
        if: success() && steps.run-type.outputs.type != 'skip' && env.SMTP_SERVER != '' && env.SMTP_USERNAME != '' && env.SMTP_PASSWORD != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ env.SMTP_SERVER }}
          server_port: ${{ env.SMTP_PORT }}
          username: ${{ env.SMTP_USERNAME }}
          password: ${{ env.SMTP_PASSWORD }}
          subject: "College football scraper succeeded"
          to: aryancurry1212@gmail.com
          from: ${{ env.SMTP_FROM }}
          body: |
            The college football scraper completed successfully.

            Repository: ${{ github.repository }}
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Results changed: ${{ steps.commit.outputs.changed }}
